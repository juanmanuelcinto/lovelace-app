name: pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lovelace-app/package-lock.json

      - name: Install dependencies
        working-directory: lovelace-app
        run: npm ci

      - name: Build app for GitHub Pages
        working-directory: lovelace-app
        run: npm run build -- --base-href /lovelace-app/

      - name: Add SPA fallback
        working-directory: lovelace-app
        run: cp dist/lovelace-app/browser/index.html dist/lovelace-app/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: lovelace-app/dist/lovelace-app/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
